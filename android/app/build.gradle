plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "com.anxcye.anx_reader"
    // compileSdk flutter.compileSdkVersion
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.pitufus.anx_remix"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            if (keystoreProperties['storeFile'] != null) {
                signingConfig signingConfigs.release
            } else {
                signingConfig signingConfigs.debug
            }
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            def abiVersionCode = 0
            def abiSuffix = ""
            if (output.getFilter(com.android.build.OutputFile.ABI) != null) {
                def abiName = output.getFilter(com.android.build.OutputFile.ABI)
                abiSuffix = "-${abiName}"
                switch(abiName) {
                    case "armeabi-v7a":
                        abiVersionCode = 0 
                        break
                    case "arm64-v8a":
                        abiVersionCode = 0
                        break
                    case "x86":
                        abiVersionCode = 0
                        break
                    case "x86_64":
                        abiVersionCode = 0
                        break
                }
            }
            output.versionCodeOverride = flutterVersionCode.toInteger() + abiVersionCode
            
            // Set custom APK name (e.g., Anx_Remix-1.15.0-remix+1-arm64-v8a-release.apk)
            def buildTypeName = variant.buildType.name
            output.outputFileName = "Anx_Remix-${variant.versionName}${abiSuffix}-${buildTypeName}.apk"
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
